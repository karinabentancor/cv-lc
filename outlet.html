<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outlet | Luna Curto - Cuadros Originales</title>
    <meta name="description" content="Outlet de Luna Curto. Cuadros originales disponibles para la venta. Obras de la artista visual Luna Curto, Montevideo, Uruguay.">
    <meta name="keywords" content="Luna Curto cuadros venta, arte original uruguay venta, comprar cuadros montevideo, outlet arte contemporáneo, obra original luna curto">
    <meta name="author" content="Luna Curto">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://lunacurto.uy/outlet.html">
    <meta property="og:title" content="Outlet - Luna Curto">
    <meta property="og:description" content="Cuadros originales de Luna Curto disponibles para la venta.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lunacurto.uy/outlet.html">
    <meta property="og:image" content="https://lunacurto.uy/media/luna%20curto%202%20svg.svg">
    <meta property="og:locale" content="es_UY">
    <meta property="og:site_name" content="Luna Curto">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>

    /* ── RESET: anular el height:100% del CSS global ──────────────────── */
    html, body {
        height: auto !important;
        min-height: 100vh;
        overflow-x: hidden !important;
    }

    /* En desktop: todo entra sin scroll */
    @media (min-width: 681px) {
        html, body {
            overflow-y: hidden !important;
            height: 100vh !important;
        }
        .page-container {
            height: 100vh !important;
            overflow: hidden !important;
            display: flex !important;
            flex-direction: column !important;
        }
        .main-content {
            flex: 1 !important;
            overflow: hidden !important;
            height: 0 !important; /* fuerza que no crezca más allá del flex */
        }
        .outlet-page {
            height: 100% !important;
            overflow: hidden !important;
            display: flex !important;
            flex-direction: column !important;
            padding: 1.5rem 2rem 0 !important;
            box-sizing: border-box !important;
        }
        .outlet-header {
            flex-shrink: 0;
            margin-bottom: 1rem !important;
        }
        .outlet-grid {
            flex: 1;
            min-height: 0;
            display: grid !important;
            /* La navbar tiene ~130px, el header ~40px, padding ~40px → sobran ~90px */
            max-height: calc(100vh - 220px) !important;
        }
        .outlet-item {
            overflow: hidden;
            padding: 1.2rem !important;
            gap: 0.6rem !important;
        }
        .cuadro-wrap {
            /* El cuadro ocupa lo que pueda sin desbordar */
            flex: 1;
            min-height: 0;
            max-height: calc(100vh - 340px) !important;
        }
        .outlet-item-name  { font-size: 0.9rem !important; }
        .outlet-item-medidas { font-size: 0.7rem !important; }
        .outlet-item-price   { font-size: 0.85rem !important; }
    }

    /* En mobile: scroll normal */
    @media (max-width: 680px) {
        html, body {
            overflow-y: auto !important;
        }
        .page-container {
            height: auto !important;
            min-height: 100vh;
            display: flex !important;
            flex-direction: column !important;
            overflow: visible !important;
        }
        .main-content {
            flex: 1 !important;
            overflow: visible !important;
            height: auto !important;
        }
        .outlet-page {
            padding: 2rem 1rem 200px !important;
        }
    }

    /* ── SECCIÓN OUTLET ─────────────────────────────────────────────────── */

    .outlet-page {
        display: block;
        width: 100%;
        padding: 3rem 2rem 220px;
        box-sizing: border-box;
    }

    .outlet-header {
        margin-bottom: 2.5rem;
    }

    .outlet-header h1 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 0.7rem;
        font-weight: 500;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        opacity: 0.45;
        margin: 0;
    }

    /* ── GRID DE CUADROS ────────────────────────────────────────────────── */

    .outlet-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1px;
        border: 1px solid #1a1a1a;
        max-width: 780px;
        opacity: 0.9;
    }

    .outlet-item {
        padding: 2rem;
        border-right: 1px solid #1a1a1a;
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
    }

    .outlet-item:last-child {
        border-right: none;
    }

    /* ── CUADRO EN GRID ─────────────────────────────────────────────────── */

    .cuadro-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 665 / 829;
        cursor: pointer;
    }

    .cuadro-obra {
        position: absolute;
        top: 9.53%; left: 13.53%;
        width: 71.28%; height: 80.94%;
        object-fit: cover;
        z-index: 1;
    }

    .cuadro-marco {
        position: absolute;
        inset: 0;
        width: 100%; height: 100%;
        z-index: 2;
        pointer-events: none;
    }

    .outlet-item-name {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        margin: 0;
    }

    .outlet-item-details {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
    }

    .outlet-item-medidas {
        font-size: 0.78rem;
        letter-spacing: 0.1em;
        opacity: 0.55;
        font-weight: 500;
    }

    .outlet-item-price {
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.05em;
    }

    .outlet-item-btns {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        margin-top: auto;
    }

    .btn-quiero {
        display: block;
        width: 100%;
        padding: 0.5rem 0.8rem;
        font-family: 'Courier New', monospace;
        font-size: 0.62rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        text-align: center;
        cursor: pointer;
        border: 1px solid #1a1a1a;
        background: none;
        color: #1a1a1a;
        font-weight: 600;
        transition: background 0.2s, color 0.2s;
    }

    .btn-quiero:hover {
        background: #1a1a1a;
        color: #faf9f7;
    }

    .outlet-sold {
        font-size: 0.65rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        opacity: 0.35;
        text-decoration: line-through;
    }

    /* ── OVERLAY ────────────────────────────────────────────────────────── */

    .detail-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.45);
        z-index: 900;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.35s ease;
    }

    .detail-overlay.open {
        opacity: 1;
        pointer-events: all;
    }

    /* ── PANEL DETALLE ──────────────────────────────────────────────────── */

    .detail-panel {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: #faf9f7;
        color: #1a1a1a;
        z-index: 950;
        display: flex;
        flex-direction: column;
        transform: translateY(110%);
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        pointer-events: none;
        overflow: hidden;
        /* Dejar espacio para la navbar fija abajo */
        padding-bottom: 130px;
    }

    .detail-panel.open {
        transform: translateY(0);
        pointer-events: all;
    }

    .detail-header {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 0.65rem 1.5rem;
        border-bottom: 1px solid #1a1a1a;
        flex-shrink: 0;
        background: #faf9f7;
    }

    .detail-close {
        background: none;
        border: none;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.6rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        font-weight: 600;
        opacity: 0.6;
        transition: opacity 0.2s;
        color: #1a1a1a;
        padding: 0;
    }

    .detail-close:hover { opacity: 1; }

    .detail-title {
        display: none;
    }

    .detail-body {
        display: grid;
        grid-template-columns: 1fr 1fr;
        flex: 1;
        min-height: 0;
        overflow: hidden;
    }

    .detail-left {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.25rem;
        border-right: 1px solid #1a1a1a;
        overflow: hidden;
    }

    .detail-cuadro-wrap {
        position: relative;
        width: min(52vh, 80%);
        aspect-ratio: 665 / 829;
        flex-shrink: 0;
    }

    .detail-cuadro-obra {
        position: absolute;
        top: 9.53%; left: 13.53%;
        width: 71.28%; height: 80.94%;
        object-fit: cover;
        z-index: 1;
    }

    .detail-cuadro-marco {
        position: absolute;
        inset: 0;
        width: 100%; height: 100%;
        z-index: 2;
        pointer-events: none;
    }

    .detail-right {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 2rem 2.5rem 2rem 2rem;
        overflow: hidden;
        min-height: 0;
        gap: 0;
    }

    .detail-right > * { flex-shrink: 0; }

    .detail-info { display: flex; flex-direction: column; gap: 0.25rem; }

    .detail-info-name {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.4rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        margin: 0;
    }

    .detail-info-medidas {
        font-size: 0.8rem;
        letter-spacing: 0.12em;
        opacity: 0.6;
        font-weight: 500;
    }

    .detail-info-price {
        font-size: 1.1rem;
        letter-spacing: 0.05em;
        font-weight: 600;
        margin-top: 0.15rem;
    }

    .detail-marco-label, .detail-thumbs-label {
        font-size: 0.6rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        opacity: 0.5;
        font-weight: 600;
        margin: 0 0 0.5rem 0;
        display: block;
    }

    .detail-marco-options {
        display: flex;
        gap: 0.75rem;
        align-items: center;
    }

    .marco-btn {
        width: 22px; height: 22px;
        border-radius: 50%;
        border: 1px solid transparent;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s;
        flex-shrink: 0;
    }

    .marco-btn.negro  { background: #111; border-color: #111; }
    .marco-btn.blanco { background: #f0f0f0; border-color: #bbb; }
    .marco-btn.active, .marco-btn:hover { transform: scale(1.15); box-shadow: 0 0 0 2px #1a1a1a; }

    .marco-label-text {
        font-size: 0.68rem;
        letter-spacing: 0.12em;
        opacity: 0.6;
        font-weight: 500;
    }

    /* ── BLOQUE INFERIOR DEL PANEL ─────────────────────────────────────── */
    .detail-bottom-block {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: flex-end;
        gap: 1.5rem;
        border-top: 1px solid rgba(26,26,26,0.12);
        padding-top: 1.5rem;
    }

    .detail-bottom-left {
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
        flex: 1;
        min-width: 0;
    }

    /* ── BOTONES CTA DEL PANEL ───────────────────────────────────────────── */
    .detail-cta-inline { display: flex; flex-direction: column; gap: 0.5rem; align-items: flex-end; flex-shrink: 0; }

    .detail-cta-btn {
        display: block;
        width: auto;
        min-width: 180px;
        padding: 0.85rem 1.4rem;
        font-family: 'Courier New', monospace;
        font-size: 0.8rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        text-align: center;
        cursor: pointer;
        border: 1.5px solid #1a1a1a;
        text-decoration: none;
        font-weight: 700;
        transition: background 0.2s, color 0.2s;
        box-sizing: border-box;
        line-height: 1.4;
    }

    .detail-cta-btn.primario   { background: #1a1a1a; color: #faf9f7; }
    .detail-cta-btn.primario:hover   { background: #faf9f7; color: #1a1a1a; }
    .detail-cta-btn.secundario { background: #faf9f7; color: #1a1a1a; }
    .detail-cta-btn.secundario:hover { background: #1a1a1a; color: #faf9f7; }

    .detail-thumbs {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.5rem;
        padding-bottom: 1rem;
    }

    .thumb-btn {
        position: relative;
        aspect-ratio: 665 / 829;
        border: none;
        cursor: pointer;
        overflow: hidden;
        opacity: 0.5;
        transition: opacity 0.2s;
        background: none;
        padding: 0;
    }

    .thumb-btn .t-obra {
        position: absolute;
        top: 9.53%; left: 13.53%;
        width: 71.28%; height: 80.94%;
        object-fit: cover;
        z-index: 1;
    }

    .thumb-btn .t-marco {
        position: absolute;
        inset: 0; width: 100%; height: 100%;
        z-index: 2;
        pointer-events: none;
    }

    .thumb-btn.active, .thumb-btn:hover { opacity: 1; }
    .thumb-btn.active { outline: 1.5px solid #1a1a1a; outline-offset: 2px; }

    /* ── MODAL DE ORDEN ─────────────────────────────────────────────────── */

    .order-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.55);
        z-index: 1000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
    }

    .order-overlay.open { opacity: 1; pointer-events: all; }

    .order-modal {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -58%);
        width: min(420px, 92vw);
        background: #faf9f7;
        color: #1a1a1a;
        z-index: 1010;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.4,0,0.2,1);
        box-sizing: border-box;
    }

    .order-modal.open {
        opacity: 1;
        pointer-events: all;
        transform: translate(-50%, -50%);
    }

    .order-modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.9rem 1.4rem;
        border-bottom: 1px solid #1a1a1a;
    }

    .order-modal-header h3 {
        font-size: 0.62rem;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        font-weight: 600;
        margin: 0;
        opacity: 0.6;
    }

    .order-modal-close {
        background: none;
        border: none;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.62rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        font-weight: 600;
        opacity: 0.55;
        transition: opacity 0.2s;
        color: #1a1a1a;
        padding: 0;
    }

    .order-modal-close:hover { opacity: 1; }

    .order-modal-body {
        padding: 1.4rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .order-summary {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
        padding-bottom: 0.9rem;
        border-bottom: 1px solid rgba(26,26,26,0.15);
    }

    .order-summary-obra   { font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; font-weight: 700; letter-spacing: 0.04em; }
    .order-summary-detalle { font-size: 0.7rem; letter-spacing: 0.1em; opacity: 0.6; font-weight: 500; }

    .order-field { display: flex; flex-direction: column; gap: 0.35rem; }

    .order-field label {
        font-size: 0.6rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        opacity: 0.55;
        font-weight: 600;
    }

    .order-field input {
        width: 100%;
        padding: 0.55rem 0;
        background: none;
        border: none;
        border-bottom: 1px solid #1a1a1a;
        font-family: 'Courier New', monospace;
        font-size: 0.9rem;
        font-weight: 500;
        color: #1a1a1a;
        outline: none;
        box-sizing: border-box;
    }

    .order-field input::placeholder { opacity: 0.3; }

    .order-submit {
        width: 100%;
        padding: 0.65rem 1rem;
        background: #1a1a1a;
        color: #faf9f7;
        border: 1px solid #1a1a1a;
        font-family: 'Courier New', monospace;
        font-size: 0.62rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s, color 0.2s;
    }

    .order-submit:hover { background: #faf9f7; color: #1a1a1a; }
    .order-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    .order-feedback {
        font-size: 0.7rem;
        letter-spacing: 0.08em;
        font-weight: 500;
        opacity: 0;
        transition: opacity 0.3s;
        min-height: 1rem;
        text-align: center;
    }

    .order-feedback.visible { opacity: 1; }
    .order-feedback.ok  { color: #2a6a2a; }
    .order-feedback.err { color: #a02020; }

    /* ── RESPONSIVE MOBILE ──────────────────────────────────────────────── */

    @media (max-width: 680px) {
        .detail-panel {
            overflow: hidden;
        }

        .detail-body {
            grid-template-columns: 1fr;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
        }

        .detail-left {
            border-right: none;
            border-bottom: 1px solid #1a1a1a;
            padding: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .detail-cuadro-wrap { width: min(28vw, 110px); }

        .detail-right {
            flex: 1;
            justify-content: space-between;
            gap: 0.5rem;
            overflow: hidden;
            padding: 0.8rem 1.2rem 1rem;
            display: flex;
            flex-direction: column;
        }

        /* En mobile los botones vuelven a ancho completo y columna */
        .detail-cta-inline {
            flex-direction: column !important;
            align-items: stretch !important;
            gap: 0.3rem;
        }

        .detail-cta-btn {
            width: 100% !important;
            min-width: unset !important;
            padding: 0.55rem 0.8rem !important;
            font-size: 0.62rem !important;
        }

        .detail-thumbs {
            grid-template-columns: repeat(4, 1fr) !important;
            gap: 0.3rem !important;
            padding-bottom: 0 !important;
        }

        .detail-info-name { font-size: 1rem; }
        .detail-info-medidas { font-size: 0.7rem; }
        .detail-info-price { font-size: 0.9rem; }
        .detail-marco-label, .detail-thumbs-label { margin-bottom: 0.3rem; }
        .detail-marco-options { gap: 0.5rem; }
    }

    @media (max-height: 500px) and (min-width: 681px) {
        .detail-header { padding: 0.4rem 1.2rem; }
        .detail-right { gap: 0.55rem; padding: 0.7rem 1.1rem; }
        .detail-info-name { font-size: 1rem; }
        .detail-cuadro-wrap { width: min(36vh, 75%); }
    }
    </style>
</head>

                <div class="outlet-grid">

                    <article class="outlet-item" itemscope itemtype="https://schema.org/Product">
                        <div class="cuadro-wrap" onclick="abrirDetalle('vos','$3.500','25 x 35 cm',['media/vos1.jpg','media/vos2.jpg'])">
                            <img class="cuadro-obra" src="media/vos1.jpg" alt="vos - cuadro original de Luna Curto" loading="lazy" itemprop="image">
                            <img class="cuadro-marco" src="media/marcon.png" alt="" aria-hidden="true">

                        <h2 class="outlet-item-name" itemprop="name">vos</h2>
                        <div class="outlet-item-details">
                            <span class="outlet-item-medidas">25 x 35 cm</span>
                            <span class="outlet-item-price" itemprop="offers" itemscope itemtype="https://schema.org/Offer">
                                <meta itemprop="priceCurrency" content="UYU">
                                <span itemprop="price" content="3500">$3.500</span>
                            </span>
                        </div>
                        <div class="outlet-item-btns">
                            <button class="btn-quiero" onclick="abrirDetalle('vos','$3.500','25 x 35 cm',['media/vos1.jpg','media/vos2.jpg'])">ver detalle</button>
                        </div>
                    </article>

                    <article class="outlet-item" itemscope itemtype="https://schema.org/Product">
                        <div class="cuadro-wrap" onclick="abrirDetalle('nn','$3.500','25 x 35 cm',['media/nn1.jpg','media/nn4.jpg'])">
                            <img class="cuadro-obra" src="media/nn1.jpg" alt="nn - cuadro original de Luna Curto" loading="lazy" itemprop="image">
                            <img class="cuadro-marco" src="media/marcon.png" alt="" aria-hidden="true">
                        </div>
                        <h2 class="outlet-item-name" itemprop="name">nn</h2>
                        <div class="outlet-item-details">
                            <span class="outlet-item-medidas">25 x 35 cm</span>
                            <span class="outlet-item-price" itemprop="offers" itemscope itemtype="https://schema.org/Offer">
                                <meta itemprop="priceCurrency" content="UYU">
                                <span itemprop="price" content="3500">$3.500</span>
                            </span>
                        </div>
                        <div class="outlet-item-btns">
                            <button class="btn-quiero" onclick="abrirDetalle('nn','$3.500','25 x 35 cm',['media/nn1.jpg','media/nn4.jpg'])">ver detalle</button>
                        </div>
                    </article>

                </div>
            </div>
        </main>
    </div>

    <!-- OVERLAY + PANEL DETALLE -->
    <div class="detail-overlay" id="detail-overlay" onclick="cerrarDetalle()"></div>

    <div class="detail-panel" id="detail-panel" role="dialog" aria-modal="true" aria-label="Detalle del cuadro">
        <div class="detail-header">
            <p class="detail-title" id="detail-title">detalle</p>
            <button class="detail-close" onclick="cerrarDetalle()">cerrar ×</button>
        </div>

        <div class="detail-body">
            <div class="detail-left">
                <div class="detail-cuadro-wrap">
                    <img class="detail-cuadro-obra" id="detail-cuadro-obra" src="" alt="">
                    <img class="detail-cuadro-marco" id="detail-cuadro-marco" src="media/marcob.png" alt="" aria-hidden="true">
                </div>
            </div>

            <div class="detail-right">

                <!-- BLOQUE SUPERIOR: nombre + precio -->
                <div class="detail-info">
                    <h2 class="detail-info-name" id="detail-info-name"></h2>
                    <span class="detail-info-medidas" id="detail-info-medidas"></span>
                    <span class="detail-info-price" id="detail-info-price"></span>
                </div>

                <!-- BLOQUE INFERIOR: marco + vistas + botones juntos -->
                <div class="detail-bottom-block">
                    <div class="detail-bottom-left">
                        <div>
                            <span class="detail-marco-label">marco</span>
                            <div class="detail-marco-options">
                                <button class="marco-btn negro"  id="btn-negro"  onclick="setMarco('negro')"  aria-label="Marco negro"></button>
                                <button class="marco-btn blanco active" id="btn-blanco" onclick="setMarco('blanco')" aria-label="Marco blanco"></button>
                                <span class="marco-label-text" id="marco-label-text">blanco</span>
                            </div>
                        </div>
                        <div>
                            <span class="detail-thumbs-label">vistas</span>
                            <div class="detail-thumbs" id="detail-thumbs"></div>
                        </div>
                    </div>
                    <div class="detail-cta-inline">
                        <button class="detail-cta-btn primario"   onclick="abrirOrden(1)">quiero este</button>
                        <button class="detail-cta-btn secundario" onclick="abrirOrden(2)">quiero los dos</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- OVERLAY + MODAL ORDEN -->
    <div class="order-overlay" id="order-overlay" onclick="cerrarOrden()"></div>

    <div class="order-modal" id="order-modal" role="dialog" aria-modal="true" aria-label="Confirmar pedido">
        <div class="order-modal-header">
            <h3>confirmar pedido</h3>
            <button class="order-modal-close" onclick="cerrarOrden()">cerrar ×</button>
        </div>
        <div class="order-modal-body">
            <div class="order-summary">
                <span class="order-summary-obra"    id="order-summary-obra"></span>
                <span class="order-summary-detalle" id="order-summary-detalle"></span>
            </div>
            <div class="order-field">
                <label for="order-nombre">nombre</label>
                <input type="text"  id="order-nombre" placeholder="tu nombre"   autocomplete="name">
            </div>
            <div class="order-field">
                <label for="order-email">mail</label>
                <input type="email" id="order-email"  placeholder="tu@mail.com" autocomplete="email">
            </div>
            <div class="order-feedback" id="order-feedback"></div>
            <button class="order-submit" id="order-submit" onclick="enviarOrden()">enviar pedido</button>
        </div>
    </div>

    <div id="loader-wrapper">
        <div id="loader"></div>
        <div class="loader-section section-left"></div>
        <div class="loader-section section-right"></div>
    </div>

    <script src="js/script.js"></script>
    <script>
        const MARCOS = {
            negro:  'media/marcon.png',
            blanco: 'media/marcob.png'
        };
        const MARCO_POS = {
            negro:  { top:'9.53%', left:'13.53%', width:'71.28%', height:'80.94%', ratio:'665 / 829' },
            blanco: { top:'9.46%', left:'7.25%',  width:'81.04%', height:'84.75%', ratio:'538 / 708' }
        };

        let marcoActual    = 'blanco';
        let cantidadActual = 1;

        function abrirDetalle(nombre, precio, medidas, imagenes) {
            const obra = document.getElementById('detail-cuadro-obra');
            obra.src = imagenes[0];
            obra.alt = nombre + ' - Luna Curto';

            document.getElementById('detail-title').textContent        = nombre;
            document.getElementById('detail-info-name').textContent    = nombre;
            document.getElementById('detail-info-medidas').textContent = medidas;
            document.getElementById('detail-info-price').textContent   = precio;

            const thumbs = document.getElementById('detail-thumbs');
            thumbs.innerHTML = '';
            imagenes.forEach((src, i) => {
                const btn = document.createElement('button');
                btn.className = 'thumb-btn' + (i === 0 ? ' active' : '');
                btn.setAttribute('aria-label', 'Vista ' + (i + 1));
                btn.innerHTML = `
                    <img class="t-obra"  src="${src}" alt="${nombre} vista ${i+1}" loading="lazy">
                    <img class="t-marco" src="${MARCOS[marcoActual]}" alt="" aria-hidden="true">
                `;
                btn.onclick = () => seleccionarObra(src, btn);
                thumbs.appendChild(btn);
            });

            setMarco('blanco');
            document.getElementById('detail-overlay').classList.add('open');
            document.getElementById('detail-panel').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function cerrarDetalle() {
            document.getElementById('detail-overlay').classList.remove('open');
            document.getElementById('detail-panel').classList.remove('open');
            document.body.style.overflow = '';
        }

        function seleccionarObra(src, btnActivo) {
            document.getElementById('detail-cuadro-obra').src = src;
            document.querySelectorAll('.thumb-btn').forEach(b => b.classList.remove('active'));
            btnActivo.classList.add('active');
        }

        function setMarco(color) {
            marcoActual = color;
            const src = MARCOS[color];
            const pos = MARCO_POS[color];

            document.getElementById('detail-cuadro-marco').src = src;
            const wrap   = document.querySelector('.detail-cuadro-wrap');
            const obraEl = document.getElementById('detail-cuadro-obra');
            wrap.style.aspectRatio = pos.ratio;
            obraEl.style.top    = pos.top;
            obraEl.style.left   = pos.left;
            obraEl.style.width  = pos.width;
            obraEl.style.height = pos.height;

            document.querySelectorAll('.thumb-btn .t-marco').forEach(img => img.src = src);
            document.querySelectorAll('.thumb-btn').forEach(btn => {
                btn.style.aspectRatio = pos.ratio;
                const t = btn.querySelector('.t-obra');
                if (t) {
                    t.style.top    = pos.top;
                    t.style.left   = pos.left;
                    t.style.width  = pos.width;
                    t.style.height = pos.height;
                }
            });

            document.getElementById('btn-negro').classList.toggle('active',  color === 'negro');
            document.getElementById('btn-blanco').classList.toggle('active', color === 'blanco');
            document.getElementById('marco-label-text').textContent = color;
        }

        function abrirOrden(cantidad) {
            cantidadActual = cantidad;
            const nombre  = document.getElementById('detail-info-name').textContent;
            const precio  = document.getElementById('detail-info-price').textContent;
            const medidas = document.getElementById('detail-info-medidas').textContent;

            document.getElementById('order-summary-obra').textContent    = nombre;
            document.getElementById('order-summary-detalle').textContent = cantidad === 2
                ? `los dos cuadros · ${medidas} · ${precio} c/u`
                : `1 cuadro · marco ${marcoActual} · ${medidas} · ${precio}`;

            const fb = document.getElementById('order-feedback');
            fb.textContent = '';
            fb.className = 'order-feedback';
            document.getElementById('order-nombre').value = '';
            document.getElementById('order-email').value  = '';
            document.getElementById('order-submit').disabled = false;

            document.getElementById('order-overlay').classList.add('open');
            document.getElementById('order-modal').classList.add('open');
        }

        function cerrarOrden() {
            document.getElementById('order-overlay').classList.remove('open');
            document.getElementById('order-modal').classList.remove('open');
        }

        function enviarOrden() {
            const nombre = document.getElementById('order-nombre').value.trim();
            const email  = document.getElementById('order-email').value.trim();
            const fb     = document.getElementById('order-feedback');

            if (!nombre) {
                fb.textContent = 'ingresá tu nombre';
                fb.className = 'order-feedback visible err';
                return;
            }
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                fb.textContent = 'ingresá un mail válido';
                fb.className = 'order-feedback visible err';
                return;
            }

            const datos = {
                nombre, email,
                obra:     document.getElementById('detail-info-name').textContent,
                marco:    cantidadActual === 2 ? 'ambos' : marcoActual,
                medidas:  document.getElementById('detail-info-medidas').textContent,
                precio:   document.getElementById('detail-info-price').textContent,
                cantidad: cantidadActual
            };

            console.log('Pedido listo para EmailJS:', datos);

            document.getElementById('order-submit').disabled = true;
            fb.textContent = 'enviando...';
            fb.className = 'order-feedback visible';

            setTimeout(() => {
                fb.textContent = 'pedido recibido — te contactamos pronto';
                fb.className = 'order-feedback visible ok';
                setTimeout(() => cerrarOrden(), 2200);
            }, 800);
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                if (document.getElementById('order-modal').classList.contains('open')) cerrarOrden();
                else if (document.getElementById('detail-panel').classList.contains('open')) cerrarDetalle();
            }
        });
    </script>
</body>
</html>
