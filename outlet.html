    <style>

    /* override del .page global que tiene display:none y min-height fija */
    #page-outlet {
        display: block !important;
        min-height: unset !important;
        height: auto !important;
        overflow-y: auto !important;
        padding-bottom: 220px !important;
        position: static !important;
    }

    .cuadro-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 665 / 829;
        cursor: pointer;
    }
    .cuadro-obra {
        position: absolute;
        top: 9.53%; left: 13.53%;
        width: 71.28%; height: 80.94%;
        object-fit: cover;
        z-index: 1;
    }
    .cuadro-marco {
        position: absolute;
        inset: 0; width: 100%; height: 100%;
        z-index: 2; pointer-events: none;
    }

    .outlet-section {
        padding: 4rem 2rem 2rem;
        min-height: unset !important;
    }

    .outlet-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1px;
        border: 1px solid currentColor;
        opacity: 0.85;
        max-width: 780px;
    }
    .outlet-item {
        padding: 2rem;
        border-right: 1px solid currentColor;
        display: flex; flex-direction: column; gap: 1.2rem;
    }
    .outlet-item:last-child { border-right: none; }
    .outlet-item-name { font-size: 1.1rem; font-weight: 400; letter-spacing: 0.05em; margin: 0; }
    .outlet-item-details { display: flex; flex-direction: column; gap: 0.3rem; }
    .outlet-item-medidas { font-size: 0.75rem; letter-spacing: 0.1em; opacity: 0.5; }
    .outlet-item-price { font-size: 1rem; font-weight: 400; letter-spacing: 0.05em; }
    .outlet-item-btns { display: flex; flex-direction: column; gap: 0.5rem; margin-top: auto; }
    .btn-quiero {
        display: block; width: 100%;
        padding: 0.6rem 1rem;
        font-family: inherit; font-size: 0.68rem;
        letter-spacing: 0.2em; text-transform: uppercase;
        text-align: center; cursor: pointer;
        border: 1px solid #1a1a1a;
        background: none; color: #1a1a1a;
        transition: background 0.2s, color 0.2s;
    }
    .btn-quiero:hover { background: #1a1a1a; color: #faf9f7; }

    /* overlay */
    .detail-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.45);
        z-index: 900; opacity: 0; pointer-events: none;
        transition: opacity 0.35s ease;
    }
    .detail-overlay.open { opacity: 1; pointer-events: all; }

    /* panel: flex column, header fijo arriba, body ocupa el resto */
    .detail-panel {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: #faf9f7; color: #1a1a1a;
        z-index: 950;
        display: flex;
        flex-direction: column;
        transform: translateY(110%);
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        pointer-events: none;
    }
    .detail-panel.open { transform: translateY(0); pointer-events: all; }

    .detail-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 1rem 2rem;
        border-bottom: 1px solid #1a1a1a;
        flex-shrink: 0;
        background: #faf9f7;
    }
    .detail-close {
        background: none; border: none; cursor: pointer;
        font-family: inherit; font-size: 0.65rem;
        letter-spacing: 0.2em; text-transform: uppercase;
        opacity: 0.5; transition: opacity 0.2s; color: #1a1a1a; padding: 0;
    }
    .detail-close:hover { opacity: 1; }
    .detail-title {
        font-size: 0.65rem; letter-spacing: 0.25em;
        text-transform: uppercase; opacity: 0.4; margin: 0;
    }

    /* body del panel: grid de 2 columnas, ocupa el espacio restante */
    .detail-body {
        display: grid;
        grid-template-columns: 1fr 1fr;
        flex: 1;
        min-height: 0;
        overflow: hidden;
    }

    .detail-left {
        display: flex; align-items: center; justify-content: center;
        padding: 2rem;
        border-right: 1px solid #1a1a1a;
        overflow: hidden;
    }
    .detail-cuadro-wrap {
        position: relative;
        width: min(50vh, 85%);
        aspect-ratio: 665 / 829;
        flex-shrink: 0;
    }
    .detail-cuadro-obra {
        position: absolute;
        top: 9.53%; left: 13.53%;
        width: 71.28%; height: 80.94%;
        object-fit: cover; z-index: 1;
    }
    .detail-cuadro-marco {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        z-index: 2; pointer-events: none;
    }

    /* columna derecha: scrolleable */
    .detail-right {
        display: flex;
        flex-direction: column;
        gap: 1.4rem;
        padding: 2rem;
        overflow-y: auto;
        overflow-x: hidden;
        min-height: 0;
    }

    .detail-info { display: flex; flex-direction: column; gap: 0.3rem; }
    .detail-info-name { font-size: 1.3rem; font-weight: 400; letter-spacing: 0.05em; margin: 0; }
    .detail-info-medidas { font-size: 0.75rem; letter-spacing: 0.1em; opacity: 0.5; }
    .detail-info-price { font-size: 1rem; letter-spacing: 0.05em; }

    .detail-marco-label, .detail-thumbs-label {
        font-size: 0.62rem; letter-spacing: 0.2em;
        text-transform: uppercase; opacity: 0.45; margin: 0 0 0.5rem 0;
        display: block;
    }
    .detail-marco-options { display: flex; gap: 0.75rem; align-items: center; }
    .marco-btn {
        width: 24px; height: 24px; border-radius: 50%;
        border: 1px solid transparent; cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s; flex-shrink: 0;
    }
    .marco-btn.negro  { background: #111; border-color: #111; }
    .marco-btn.blanco { background: #f0f0f0; border-color: #bbb; }
    .marco-btn.active, .marco-btn:hover { transform: scale(1.15); box-shadow: 0 0 0 2px #1a1a1a; }
    .marco-label-text { font-size: 0.68rem; letter-spacing: 0.12em; opacity: 0.5; }

    /* botones CTA — debajo del selector de marco */
    .detail-cta-inline { display: flex; flex-direction: column; gap: 0.4rem; }
    .detail-cta-btn {
        display: block;
        width: 100%;
        padding: 0.5rem 0.8rem;
        font-family: 'Courier New', monospace;
        font-size: 0.6rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        text-align: center;
        cursor: pointer;
        border: 1px solid #1a1a1a;
        text-decoration: none;
        transition: background 0.2s, color 0.2s;
        box-sizing: border-box;
        line-height: 1.6;
    }
    .detail-cta-btn.primario   { background: #1a1a1a; color: #faf9f7; }
    .detail-cta-btn.primario:hover { background: #faf9f7; color: #1a1a1a; }
    .detail-cta-btn.secundario { background: #faf9f7; color: #1a1a1a; }
    .detail-cta-btn.secundario:hover { background: #1a1a1a; color: #faf9f7; }

    .detail-thumbs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.4rem; }
    .thumb-btn {
        position: relative; aspect-ratio: 665 / 829;
        border: none; cursor: pointer; overflow: hidden;
        opacity: 0.5; transition: opacity 0.2s; background: none; padding: 0;
    }
    .thumb-btn .t-obra {
        position: absolute;
        top: 9.53%; left: 13.53%; width: 71.28%; height: 80.94%;
        object-fit: cover; z-index: 1;
    }
    .thumb-btn .t-marco {
        position: absolute; inset: 0; width: 100%; height: 100%;
        z-index: 2; pointer-events: none;
    }
    .thumb-btn.active, .thumb-btn:hover { opacity: 1; }
    .thumb-btn.active { outline: 1.5px solid #1a1a1a; outline-offset: 2px; }

    /* modal de orden */
    .order-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.55);
        z-index: 1000; opacity: 0; pointer-events: none;
        transition: opacity 0.3s ease;
    }
    .order-overlay.open { opacity: 1; pointer-events: all; }
    .order-modal {

        top: 50%; left: 50%;
        transform: translate(-50%, -58%);

        background: #faf9f7; color: #1a1a1a;

    .order-modal.open { opacity: 1; pointer-events: all; transform: translate(-50%, -50%); }
    .order-modal-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 1rem 1.4rem;
        border-bottom: 1px solid #1a1a1a;
    }
    .order-modal-header h3 {
        font-size: 0.62rem; letter-spacing: 0.25em;
        text-transform: uppercase; font-weight: 400; margin: 0; opacity: 0.5;
    }
    .order-modal-close {
        background: none; border: none; cursor: pointer;
        font-family: inherit; font-size: 0.62rem;
        letter-spacing: 0.2em; text-transform: uppercase;
        opacity: 0.5; transition: opacity 0.2s; color: #1a1a1a; padding: 0;
    }
    .order-modal-close:hover { opacity: 1; }
    .order-modal-body { padding: 1.4rem; display: flex; flex-direction: column; gap: 1.1rem; }
    .order-summary {
        display: flex; flex-direction: column; gap: 0.2rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid rgba(26,26,26,0.15);
    }
    .order-summary-obra { font-size: 1rem; font-weight: 400; letter-spacing: 0.05em; }
    .order-summary-detalle { font-size: 0.7rem; letter-spacing: 0.1em; opacity: 0.5; }
    .order-field { display: flex; flex-direction: column; gap: 0.35rem; }
    .order-field label {
        font-size: 0.6rem; letter-spacing: 0.22em;
        text-transform: uppercase; opacity: 0.45;
    }
    .order-field input {
        width: 100%; padding: 0.6rem 0;
        background: none; border: none;
        border-bottom: 1px solid #1a1a1a;
        font-family: 'Courier New', monospace;
        font-size: 0.9rem; color: #1a1a1a;
        outline: none; box-sizing: border-box;
    }
    .order-field input::placeholder { opacity: 0.3; }
    .order-submit {
        width: 100%; padding: 0.75rem 1rem;
        background: #1a1a1a; color: #faf9f7;
        border: 1px solid #1a1a1a;
        font-family: 'Courier New', monospace;
        font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
        cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .order-submit:hover { background: #faf9f7; color: #1a1a1a; }
    .order-submit:disabled { opacity: 0.4; cursor: not-allowed; }
    .order-feedback {
        font-size: 0.7rem; letter-spacing: 0.08em;
        opacity: 0; transition: opacity 0.3s; min-height: 1rem; text-align: center;
    }
    .order-feedback.visible { opacity: 1; }
    .order-feedback.ok  { color: #2a6a2a; }
    .order-feedback.err { color: #a02020; }

    /* mobile */
    @media (max-width: 680px) {
        .detail-body {
            grid-template-columns: 1fr;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .detail-left {
            border-right: none;
            border-bottom: 1px solid #1a1a1a;
            padding: 1.25rem;
            flex-shrink: 0;
        }
        .detail-cuadro-wrap { width: min(45vw, 180px); }
        .detail-right {
            overflow-y: visible;
            padding: 1.25rem;
            gap: 1rem;
        }
    }
    </style>

    <script>
        const MARCOS = {
            negro:  'media/marcon.png',
            blanco: 'media/marcob.png'
        };
        const MARCO_POS = {
            negro:  { top:'9.53%', left:'13.53%', width:'71.28%', height:'80.94%', ratio:'665 / 829' },
            blanco: { top:'9.46%', left:'7.25%',  width:'81.04%', height:'84.75%', ratio:'538 / 708' }
        };

        let marcoActual    = 'blanco';
        let cantidadActual = 1;

        function abrirDetalle(nombre, precio, medidas, imagenes) {
            const obra = document.getElementById('detail-cuadro-obra');
            obra.src = imagenes[0];
            obra.alt = nombre + ' - Luna Curto';

            document.getElementById('detail-title').textContent        = nombre;
            document.getElementById('detail-info-name').textContent    = nombre;
            document.getElementById('detail-info-medidas').textContent = medidas;
            document.getElementById('detail-info-price').textContent   = precio;

            const thumbs = document.getElementById('detail-thumbs');
            thumbs.innerHTML = '';
            imagenes.forEach((src, i) => {
                const btn = document.createElement('button');
                btn.className = 'thumb-btn' + (i === 0 ? ' active' : '');
                btn.setAttribute('aria-label', 'Vista ' + (i + 1));
                btn.innerHTML = `
                    <img class="t-obra"  src="${src}" alt="${nombre} vista ${i+1}" loading="lazy">
                    <img class="t-marco" src="${MARCOS[marcoActual]}" alt="" aria-hidden="true">
                `;
                btn.onclick = () => seleccionarObra(src, btn);
                thumbs.appendChild(btn);
            });

            setMarco('blanco');
            document.getElementById('detail-overlay').classList.add('open');
            document.getElementById('detail-panel').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function cerrarDetalle() {
            document.getElementById('detail-overlay').classList.remove('open');
            document.getElementById('detail-panel').classList.remove('open');
            document.body.style.overflow = '';
        }

        function seleccionarObra(src, btnActivo) {
            document.getElementById('detail-cuadro-obra').src = src;
            document.querySelectorAll('.thumb-btn').forEach(b => b.classList.remove('active'));
            btnActivo.classList.add('active');
        }

        function setMarco(color) {
            marcoActual = color;
            const src = MARCOS[color];
            const pos = MARCO_POS[color];

            document.getElementById('detail-cuadro-marco').src = src;
            const wrap   = document.querySelector('.detail-cuadro-wrap');
            const obraEl = document.getElementById('detail-cuadro-obra');
            wrap.style.aspectRatio = pos.ratio;
            obraEl.style.top    = pos.top;
            obraEl.style.left   = pos.left;
            obraEl.style.width  = pos.width;
            obraEl.style.height = pos.height;

            document.querySelectorAll('.thumb-btn .t-marco').forEach(img => img.src = src);
            document.querySelectorAll('.thumb-btn').forEach(btn => {
                btn.style.aspectRatio = pos.ratio;
                const t = btn.querySelector('.t-obra');
                if (t) { t.style.top = pos.top; t.style.left = pos.left; t.style.width = pos.width; t.style.height = pos.height; }
            });

            document.getElementById('btn-negro').classList.toggle('active',  color === 'negro');
            document.getElementById('btn-blanco').classList.toggle('active', color === 'blanco');
            document.getElementById('marco-label-text').textContent = color;
        }

        function abrirOrden(cantidad) {
            cantidadActual = cantidad;
            const nombre  = document.getElementById('detail-info-name').textContent;
            const precio  = document.getElementById('detail-info-price').textContent;
            const medidas = document.getElementById('detail-info-medidas').textContent;

            document.getElementById('order-summary-obra').textContent = nombre;
            document.getElementById('order-summary-detalle').textContent = cantidad === 2
                ? `los dos cuadros · ${medidas} · ${precio} c/u`
                : `1 cuadro · marco ${marcoActual} · ${medidas} · ${precio}`;

            const fb = document.getElementById('order-feedback');
            fb.textContent = '';
            fb.className = 'order-feedback';
            document.getElementById('order-nombre').value = '';
            document.getElementById('order-email').value  = '';
            document.getElementById('order-submit').disabled = false;

            document.getElementById('order-overlay').classList.add('open');
            document.getElementById('order-modal').classList.add('open');
        }

        function cerrarOrden() {
            document.getElementById('order-overlay').classList.remove('open');
            document.getElementById('order-modal').classList.remove('open');
        }

        function enviarOrden() {
            const nombre = document.getElementById('order-nombre').value.trim();
            const email  = document.getElementById('order-email').value.trim();
            const fb     = document.getElementById('order-feedback');

            if (!nombre) {
                fb.textContent = 'ingresá tu nombre';
                fb.className = 'order-feedback visible err';
                return;
            }
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                fb.textContent = 'ingresá un mail válido';
                fb.className = 'order-feedback visible err';
                return;
            }

            const datos = {
                nombre, email,
                obra:     document.getElementById('detail-info-name').textContent,
                marco:    cantidadActual === 2 ? 'ambos' : marcoActual,
                medidas:  document.getElementById('detail-info-medidas').textContent,
                precio:   document.getElementById('detail-info-price').textContent,
                cantidad: cantidadActual
            };

            console.log('Pedido listo para EmailJS:', datos);

            document.getElementById('order-submit').disabled = true;
            fb.textContent = 'enviando...';
            fb.className = 'order-feedback visible';

            setTimeout(() => {
                fb.textContent = 'pedido recibido — te contactamos pronto';
                fb.className = 'order-feedback visible ok';
                setTimeout(() => cerrarOrden(), 2200);
            }, 800);
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                if (document.getElementById('order-modal').classList.contains('open')) cerrarOrden();
                else cerrarDetalle();
            }
        });
    </script>
</body>
</html>
